# Backend CI/CD Pipeline
# Triggers on changes to src/2-api/ folder on main or develop branches

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - src/2-api/**

variables:
  - group: taskapp-variables
  - name: imageTag
    value: $(Build.BuildId)

stages:
  # ── Stage 1: Build & Push Docker Image ──────────────────
  - stage: Build
    displayName: 'Build and Push Docker Image'
    jobs:
      - job: BuildJob
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              command: login
              containerRegistry: acr-service-connection

          - task: Docker@2
            displayName: 'Build Backend Image'
            inputs:
              command: build
              repository: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME)
              dockerfile: src/2-api/Dockerfile
              buildContext: src/2-api/
              tags: |
                $(imageTag)
                latest

          - task: Docker@2
            displayName: 'Push Backend Image to ACR'
            inputs:
              command: push
              repository: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME)
              tags: |
                $(imageTag)
                latest

  # ── Stage 2: Deploy to Prod ─────────────────────────────
  - stage: DeployProd
    displayName: 'Deploy to Production'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProdJob
        environment: 'production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy Backend to App Service'
                  inputs:
                    azureSubscription: $(AZURE_SUBSCRIPTION)
                    appName: $(BACKEND_APP_NAME)
                    containers: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME):$(imageTag)